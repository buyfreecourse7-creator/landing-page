  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; overflow: hidden;
    background: linear-gradient(160deg, #1a2540 0%, #1e3060 40%, #162035 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif;
  }
  .card {
    background: linear-gradient(180deg, #1e2d50 0%, #182240 60%, #141c35 100%);
    border-radius: 18px; max-width: 400px; width: 94%;
    padding: 18px 22px 16px; text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    display: flex; flex-direction: column; gap: 10px;
  }
  .logo-wrap {
    width: 110px; height: 110px; margin: 0 auto;
    border-radius: 50%; overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    border: 3px solid #2979d0; flex-shrink: 0;
  }
  .logo-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
  .brand { font-family: 'Bebas Neue', cursive; font-size: 1.7rem; letter-spacing: 2px; color: #fff; line-height: 1; }
  .brand .emoji { font-size: 1.4rem; vertical-align: middle; }
  .tagline { color: #a0b4d0; font-size: 0.8rem; font-weight: 500; line-height: 1.5; }
  .features {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 6px 10px; list-style: none;
  }
  .features li {
    color: #c8d8ee; font-size: 0.75rem; font-weight: 600;
    display: flex; align-items: center; gap: 4px;
    white-space: nowrap;
  }
  .check svg { width: 14px; height: 14px; flex-shrink: 0; }
  .btn {
    display: block; width: 100%; padding: 13px;
    background: #2979d0; color: #fff;
    font-family: 'Bebas Neue', cursive; font-size: 1.3rem; letter-spacing: 2px;
    border: none; border-radius: 8px; cursor: pointer; text-decoration: none;
    transition: background 0.2s;
  }
  .btn:hover { background: #1a5ab5; }
  .footer { color: #5a7090; font-size: 0.7rem; font-weight: 500; }
</style>
